services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./ai_engine:/app/ai_engine
      - ./repo-parser:/app/repo-parser
      - ./diagram-engine:/app/diagram-engine
      - ./vector-store:/app/vector-store

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    env_file:
      - frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info
    env_file:
      - backend/.env
    depends_on:
      - redis
    volumes:
      - ./backend:/app/backend
      - ./ai_engine:/app/ai_engine
      - ./repo-parser:/app/repo-parser
      - ./diagram-engine:/app/diagram-engine
      - ./vector-store:/app/vector-store
